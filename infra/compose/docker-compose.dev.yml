services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: infracode_whatsapp
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp
      PLATFORM_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp?schema=platform
      PLATFORM_DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp?schema=platform
      TENANT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp?schema=tenant_template
      TENANT_DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp?schema=tenant_template
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 3333
      ENABLE_AUTH: "true"
      PUBLIC_API_BASE_URL: http://localhost:3333
    depends_on:
      - postgres
      - redis
    ports:
      - "3333:3333"
    volumes:
      - ../../apps/api/data:/app/apps/api/data

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp
      PLATFORM_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp?schema=platform
      PLATFORM_DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp?schema=platform
      TENANT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp?schema=tenant_template
      TENANT_DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/infracode_whatsapp?schema=tenant_template
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  panel:
    build:
      context: ../..
      dockerfile: infra/docker/panel.Dockerfile
    env_file:
      - ../../.env
    environment:
      API_INTERNAL_BASE_URL: http://api:3333
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3333
      NEXT_PUBLIC_DEFAULT_TENANT: demo
    depends_on:
      - api
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.1.1
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro

  nginx:
    image: nginx:1.29
    depends_on:
      - api
      - panel
    ports:
      - "8080:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
